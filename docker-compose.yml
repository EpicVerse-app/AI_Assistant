# Local backend with PostgreSQL.
#
# Setup:
#   cp backend/utils/.env.example backend/utils/.env
#   # add SARVAM_API_KEY and OPENAI_API_KEY to backend/utils/.env
#
# Run:
#   docker compose up --build
#
# API: http://localhost:8000/docs
# Postgres: localhost:5432 (user/pass/db: ai_assistant)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ai_assistant
      POSTGRES_PASSWORD: ai_assistant
      POSTGRES_DB: ai_assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_assistant -d ai_assistant"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/utils/.env
        required: false
    environment:
      PORT: "8000"
      DATABASE_URL: postgresql+psycopg2://ai_assistant:ai_assistant@db:5432/ai_assistant
      STORAGE_BACKEND: local
      REQUIRE_API_KEY: "false"
      JWT_SECRET: dev-local-jwt-secret-change-in-production-min-32-chars
      RATE_LIMIT_STORAGE_URI: redis://redis:6379/0
      LOG_FORMAT: text
      LOG_LEVEL: INFO
    volumes:
      - api-uploads:/app/uploads
      - api-outputs:/app/outputs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  api-uploads:
  api-outputs:
